<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | DevBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                    <span class="text-xl font-bold text-slate-800">Dev<span class="text-blue-600">Blog</span></span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-slate-600 hover:text-blue-600 transition">Home</a>
                    <a href="course.html" class="bg-blue-600 text-white px-5 py-2 rounded-full hover:bg-blue-700 transition">Courses</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="bg-slate-900 py-16 text-center text-white">
        <h1 class="text-4xl font-extrabold mb-4">Complete Your Enrollment</h1>
        <p class="text-slate-400">Review your courses and complete the payment.</p>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-4 py-12 space-y-8">
        <!-- Selected Courses -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-4">Selected Courses</h2>
            <ul id="enrollCartList" class="space-y-3"></ul>
            <div id="totalPrice" class="mt-6 pt-4 border-t font-bold text-lg text-blue-600"></div>
        </div>

        <!-- Payment Form -->
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-6">Payment Information</h2>
            <form id="enrollForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-medium mb-1">Full Name</label>
                    <input type="text" id="name" class="w-full border border-slate-300 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="email" class="w-full border border-slate-300 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Payment Method</label>
                    <select id="paymentOption" class="w-full border border-slate-300 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <option value="">Select Method</option>
                        <option value="Bkash">Bkash</option>
                        <option value="Nagad">Nagad</option>
                        <option value="Stripe">Stripe</option>
                    </select>
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-medium mb-1">Transaction Code</label>
                    <input type="text" id="transactionCode" placeholder="Enter transaction code" class="w-full border border-slate-300 rounded-lg py-2.5 px-4 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <button type="submit" class="col-span-1 md:col-span-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                    Enroll Now
                </button>
            </form>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none p-4"></div>

    <!-- Script -->
    <script>
        const cart = JSON.parse(localStorage.getItem('enrollCart') || "[]");
        const enrollCartList = document.getElementById('enrollCartList');
        const totalPriceEl = document.getElementById('totalPrice');

        function renderCart() {
            enrollCartList.innerHTML = '';
            if(cart.length === 0) {
                enrollCartList.innerHTML = '<li class="text-slate-400 italic">Cart is empty</li>';
                totalPriceEl.textContent = '';
                return;
            }
            let total = 0;
            cart.forEach(item => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-3 bg-slate-50 rounded-lg border";
                li.innerHTML = `<span>${item.title}</span><span class="font-bold">$${item.price}</span>`;
                enrollCartList.appendChild(li);
                total += item.price;
            });
            totalPriceEl.textContent = `Total: $${total}`;
        }

        renderCart();

        // Updated toast function
        // Updated square toast function
function showPaymentToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `bg-green-600 text-white px-10 py-6 shadow-2xl pointer-events-auto transform transition-all duration-500 ease-out opacity-0 scale-75 flex flex-col items-center gap-3`;

    toast.innerHTML = `
        <div class="w-16 h-16 bg-white flex items-center justify-center text-green-600 text-3xl shadow-lg">
            <i class="fa-solid fa-check"></i>
        </div>
        <span class="font-bold text-lg text-center">${message}</span>
    `;

    container.appendChild(toast);

    // Show animation
    setTimeout(() => {
        toast.classList.remove('opacity-0', 'scale-75');
    }, 10);

    // Auto hide after 3 seconds
    setTimeout(() => {
        toast.classList.add('opacity-0', 'scale-75');
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

        // Form submission
        document.getElementById('enrollForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const method = document.getElementById('paymentOption').value;
            const code = document.getElementById('transactionCode').value;
            const total = cart.reduce((sum, item) => sum + item.price, 0);

            showPaymentToast(`Payment Method: ${method} | Txn: ${code} | Total: $${total}`);
            setTimeout(() => window.location.href = "course.html", 3000);
        });
    </script>

</body>
</html>
